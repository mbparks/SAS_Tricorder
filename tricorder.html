<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#060809" />
  <title>MK-VII Field Scanner</title>
  <style>
    html, body { margin: 0; padding: 0; background: #000; min-height: 100vh; }
    body { overscroll-behavior: none; -webkit-tap-highlight-color: transparent; }
    #root { min-height: 100vh; }
    .boot { color: #5c8a8f; font-family: 'JetBrains Mono', ui-monospace, monospace;
            font-size: 11px; letter-spacing: 0.3em; text-align: center;
            padding-top: 40vh; animation: b 1s ease-in-out infinite; }
    .err  { color: #c25050; font-family: 'JetBrains Mono', ui-monospace, monospace;
            font-size: 11px; padding: 20px; white-space: pre-wrap; word-break: break-word; }
    @keyframes b { 0%,100% { opacity: 1 } 50% { opacity: 0.3 } }
  </style>
</head>
<body>
  <div id="root"><div class="boot">◯ BOOTING MK-VII…</div></div>
  <script>
    (function () {
      function show(where, msg, file, line) {
        var r = document.getElementById("root");
        if (!r) return;
        r.innerHTML = '<div class="err">◯ BOOT FAILURE · ' + where + '\n\n'
          + (msg || "unknown") + (file ? '\n\nsource: ' + file : '')
          + (line ? '\nline: ' + line : '') + '</div>';
      }
      window.addEventListener("error", function (e) { show("runtime", e.message, e.filename, e.lineno); });
      window.addEventListener("unhandledrejection", function (e) {
        show("promise", (e.reason && (e.reason.message || e.reason.toString())) || "rejected");
      });
    })();
  </script>
  <script>
    if (!window.storage) {
      window.storage = {
        get: function (k) { try { var v = localStorage.getItem(k); return Promise.resolve(v !== null ? { key:k, value:v } : null); } catch (e) { return Promise.resolve(null); } },
        set: function (k, v) { try { localStorage.setItem(k, v); return Promise.resolve({ key:k, value:v }); } catch (e) { return Promise.resolve(null); } },
        delete: function (k) { try { localStorage.removeItem(k); return Promise.resolve({ key:k, deleted:true }); } catch (e) { return Promise.resolve(null); } },
      };
    }
  </script>
